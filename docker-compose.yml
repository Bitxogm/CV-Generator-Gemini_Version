services:
  postgres:
    image: postgres:16-alpine
    container_name: talenthub-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: talenthub
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: talenthub
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U talenthub -d talenthub"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nginx-proxy_default

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: talenthub-backend
    restart: unless-stopped
    expose:
      - "3000"
    env_file:
      - ./backend/.env.production
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - nginx-proxy_default

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: talenthub-frontend
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      - backend
    networks:
      - nginx-proxy_default

networks:
  nginx-proxy_default:
    external: true

volumes:
  postgres_data:
    driver: local
